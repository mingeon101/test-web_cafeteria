<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스마트 급식 관리자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #FF6B35;
      --primary-light: #fff0e8;
      --secondary: #F7C59F;
      --accent: #1A1A2E;
      --bg: #F0EDE8;
      --card: #FFFFFF;
      --muted: #8B7355;
      --success: #2E7D32;
      --success-bg: #E8F5E9;
      --danger: #C62828;
      --danger-bg: #FFEBEE;
      --warning: #E65100;
      --warning-bg: #FFF3E0;
      --info: #1565C0;
      --info-bg: #E3F2FD;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--accent);
    }

    #app { max-width: 960px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    .header {
      background: var(--accent);
      color: white;
      padding: 18px 28px 15px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 24px rgba(26,26,46,0.35);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-size: 26px; }
    .header-title { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; }
    .header-sub { font-size: 11px; opacity: 0.45; letter-spacing: 0.8px; text-transform: uppercase; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 12px; }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4CAF50;
      box-shadow: 0 0 6px #4CAF50;
      animation: pulse-dot 1.4s ease infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-time {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      opacity: 0.55;
    }

    /* ── CONTENT ── */
    .content { padding: 24px 20px 48px; flex: 1; display: flex; flex-direction: column; gap: 20px; }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 22px 24px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.04);
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.5px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── KPI GRID ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
    }
    .kpi-card {
      background: var(--card);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.04);
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }
    .kpi-card.green::before  { background: #4CAF50; }
    .kpi-card.orange::before { background: var(--primary); }
    .kpi-card.blue::before   { background: #1976D2; }
    .kpi-card.red::before    { background: #E53935; }

    .kpi-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
    .kpi-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -1px;
    }
    .kpi-unit { font-size: 14px; font-weight: 400; color: var(--muted); margin-left: 4px; }
    .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

    /* ── ROBOT STATUS ── */
    .robot-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 600px) { .robot-grid { grid-template-columns: 1fr; } }

    .robot-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.04);
    }

    .robot-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .robot-name { font-weight: 700; font-size: 15px; }
    .robot-id { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'Space Grotesk', sans-serif; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 100px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .status-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .status-pill.active   { background: var(--success-bg); color: var(--success); }
    .status-pill.active .dot   { background: #4CAF50; animation: pulse-dot 1.4s ease infinite; }
    .status-pill.idle     { background: var(--info-bg); color: var(--info); }
    .status-pill.idle .dot     { background: #1976D2; }
    .status-pill.error    { background: var(--danger-bg); color: var(--danger); }
    .status-pill.error .dot    { background: #E53935; animation: blink 0.7s step-end infinite; }
    .status-pill.standby  { background: var(--warning-bg); color: var(--warning); }
    .status-pill.standby .dot  { background: #FB8C00; }
    @keyframes blink { 50% { opacity: 0; } }

    .robot-state-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      font-size: 13px;
    }
    .robot-state-row:last-child { border-bottom: none; padding-bottom: 0; }
    .robot-state-row .label { color: var(--muted); }
    .robot-state-row .value { font-weight: 600; font-family: 'Space Grotesk', sans-serif; }

    /* error highlight */
    .robot-state-row.has-error .value { color: var(--danger); }
    .robot-state-row.ok .value { color: var(--success); }

    /* ── FOOD REMAINING ── */
    .food-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .food-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .food-emoji {
      width: 38px; height: 38px;
      background: var(--primary-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .food-info { flex: 1; min-width: 0; }
    .food-name { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
    .food-bar-wrap {
      background: #F0EDE8;
      border-radius: 100px;
      height: 8px;
      overflow: hidden;
    }
    .food-bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }
    .food-remaining {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
      min-width: 56px;
      text-align: right;
      color: var(--accent);
      flex-shrink: 0;
    }
    .food-remaining.low  { color: var(--danger); }
    .food-remaining.mid  { color: var(--warning); }
    .food-remaining.full { color: var(--success); }

    /* ── RECENT ACTIVITY ── */
    .activity-list { display: flex; flex-direction: column; gap: 0; }
    .activity-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      animation: fadeIn 0.3s ease;
    }
    .activity-item:last-child { border-bottom: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .activity-avatar {
      width: 34px; height: 34px;
      background: var(--primary-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .activity-name { font-size: 14px; font-weight: 600; }
    .activity-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .activity-time {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      flex-shrink: 0;
    }

    /* ── TWO-COL LAYOUT ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 680px) { .two-col { grid-template-columns: 1fr; } }

    /* ── CAPACITY RING ── */
    .capacity-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .capacity-ring-svg { display: block; }
    .capacity-text-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: central;
      fill: var(--accent, #1A1A2E);
    }
    .capacity-text-label {
      font-size: 11px;
      text-anchor: middle;
      dominant-baseline: central;
      fill: var(--muted, #8B7355);
    }

    /* ── ERROR LOG ── */
    .error-log {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .error-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--danger-bg);
      border: 1px solid rgba(229,57,53,0.18);
      border-radius: 12px;
      padding: 12px 14px;
    }
    .error-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .error-code { font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700; color: var(--danger); }
    .error-desc { font-size: 13px; color: var(--accent); margin-top: 2px; }
    .error-time { font-family: 'Space Grotesk', sans-serif; font-size: 11px; color: var(--muted); margin-top: 3px; }

    .no-error {
      text-align: center;
      padding: 24px 0;
      color: var(--muted);
      font-size: 14px;
    }
    .no-error-icon { font-size: 32px; margin-bottom: 8px; }

    /* ── REFRESH BTN ── */
    .btn-refresh {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary-light);
      border: 1.5px solid var(--secondary);
      color: var(--primary);
      border-radius: 10px;
      padding: 7px 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-refresh:hover { background: var(--secondary); }
    .btn-refresh.spin svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, #f0ede8 25%, #e5e0da 50%, #f0ede8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
      height: 18px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── FADE UP ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.38s ease forwards; }

    /* ── FIREBASE CONN ── */
    .conn-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
    }
    .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: #4CAF50; }
    .conn-dot.error { background: #E53935; }
    .conn-dot.connecting { background: #FB8C00; animation: pulse-dot 1s ease infinite; }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">⚙️</div>
      <div>
        <div class="header-title">관리자 대시보드</div>
        <div class="header-sub">Smart Cafeteria Admin</div>
      </div>
    </div>
    <div class="header-right">
      <div class="conn-status" id="conn-status">
        <div class="conn-dot connecting" id="conn-dot"></div>
        <span id="conn-text">연결 중...</span>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        실시간
      </div>
      <div class="header-time" id="header-time">--:--:--</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content fade-up">

    <!-- KPI 카드 -->
    <div>
      <div class="section-title">📊 오늘의 현황</div>
      <div class="kpi-grid">
        <div class="kpi-card green">
          <div class="kpi-label">완료 배식 인원</div>
          <div class="kpi-value" id="kpi-served">—<span class="kpi-unit">명</span></div>
          <div class="kpi-sub" id="kpi-served-sub">데이터 로드 중...</div>
        </div>
        <div class="kpi-card orange">
          <div class="kpi-label">추가 배식 가능</div>
          <div class="kpi-value" id="kpi-remain">—<span class="kpi-unit">명</span></div>
          <div class="kpi-sub" id="kpi-remain-sub">전체 인원 기준</div>
        </div>
        <div class="kpi-card blue">
          <div class="kpi-label">현재 대기 인원</div>
          <div class="kpi-value" id="kpi-queue">—<span class="kpi-unit">명</span></div>
          <div class="kpi-sub" id="kpi-queue-sub">실시간 대기열</div>
        </div>
        <div class="kpi-card red">
          <div class="kpi-label">활성 오류</div>
          <div class="kpi-value" id="kpi-errors">—<span class="kpi-unit">건</span></div>
          <div class="kpi-sub" id="kpi-errors-sub">로봇 시스템 오류</div>
        </div>
      </div>
    </div>

    <!-- 로봇 상태 -->
    <div>
      <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;">
        🤖 로봇 상태
        <button class="btn-refresh" id="btn-refresh" onclick="refreshAll()">
          <svg id="refresh-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          새로고침
        </button>
      </div>
      <div class="robot-grid" id="robot-grid">
        <!-- 로봇 카드는 JS로 렌더 -->
        <div class="robot-card"><div class="skeleton" style="height:140px; border-radius:12px;"></div></div>
        <div class="robot-card"><div class="skeleton" style="height:140px; border-radius:12px;"></div></div>
      </div>
    </div>

    <!-- 잔반량 + 수용 가능 인원 -->
    <div class="two-col">
      <!-- 잔반량 -->
      <div>
        <div class="section-title">🥡 잔반량 / 남은 음식</div>
        <div class="card">
          <div class="card-title">📦 음식별 잔여 비율</div>
          <div class="food-grid" id="food-grid">
            <div class="skeleton" style="height:36px;"></div>
            <div class="skeleton" style="height:36px;"></div>
            <div class="skeleton" style="height:36px;"></div>
            <div class="skeleton" style="height:36px;"></div>
            <div class="skeleton" style="height:36px;"></div>
            <div class="skeleton" style="height:36px;"></div>
          </div>
        </div>
      </div>

      <!-- 수용 가능 인원 링 -->
      <div>
        <div class="section-title">👥 배식 수용 현황</div>
        <div class="card" style="display:flex;flex-direction:column;align-items:center;gap:16px;">
          <div class="card-title" style="align-self:flex-start;">🔢 잔여 배식 가능 인원</div>
          <div class="capacity-wrap" id="capacity-wrap">
            <svg class="capacity-ring-svg" width="160" height="160" viewBox="0 0 160 160">
              <circle cx="80" cy="80" r="65" fill="none" stroke="#F0EDE8" stroke-width="12"/>
              <circle id="cap-ring" cx="80" cy="80" r="65" fill="none"
                stroke="var(--primary)" stroke-width="12" stroke-linecap="round"
                stroke-dasharray="408.4" stroke-dashoffset="408.4"
                transform="rotate(-90 80 80)"
                style="transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1);"/>
              <text id="cap-val" class="capacity-text-val" x="80" y="74">—</text>
              <text id="cap-label" class="capacity-text-label" x="80" y="96">명 가능</text>
            </svg>
          </div>
          <div style="text-align:center;">
            <div style="font-size:12px;color:var(--muted);">전체 학생 / 총 수용</div>
            <div style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-top:4px;" id="cap-fraction">— / —</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 에러 로그 -->
    <div>
      <div class="section-title">⚠️ 시스템 오류 로그</div>
      <div class="card">
        <div class="card-title">🔴 활성 오류 목록</div>
        <div class="error-log" id="error-log">
          <div class="skeleton" style="height:60px; border-radius:12px;"></div>
        </div>
      </div>
    </div>

    <!-- 최근 배식 기록 -->
    <div>
      <div class="section-title">📋 최근 배식 기록</div>
      <div class="card">
        <div class="card-title">🕐 실시간 배식 로그</div>
        <div class="activity-list" id="activity-list">
          <div class="skeleton" style="height:44px;"></div>
          <div class="skeleton" style="height:44px; margin-top:8px;"></div>
          <div class="skeleton" style="height:44px; margin-top:8px;"></div>
        </div>
      </div>
    </div>

  </div>
</div>

  errors: [],
  recentServed: []
};

/* ══════════════════════════════════════
   CLOCK
══════════════════════════════════════ */
function updateClock() {
  const now = new Date();
  document.getElementById('header-time').textContent =
    now.toLocaleTimeString('ko-KR', { hour12: false });
}
updateClock();
setInterval(updateClock, 1000);

/* ══════════════════════════════════════
   FIREBASE CONNECTION STATUS
══════════════════════════════════════ */
function setConnStatus(state) {
  const dot  = document.getElementById('conn-dot');
  const text = document.getElementById('conn-text');
  dot.className = 'conn-dot';
  if (state === 'connected')    { dot.classList.add(''); text.textContent = 'Firebase 연결됨'; }
  else if (state === 'error')   { dot.classList.add('error'); text.textContent = '연결 오류'; }
  else                          { dot.classList.add('connecting'); text.textContent = '연결 중...'; }
}

db.ref('.info/connected').on('value', snap => {
  setConnStatus(snap.val() ? 'connected' : 'error');
});

/* ══════════════════════════════════════
   ROBOT STATUS HELPERS
══════════════════════════════════════ */
const STATE_LABELS = {
  active:  { label: '배식 중',   cls: 'active'  },
  idle:    { label: '대기 중',   cls: 'idle'    },
  error:   { label: '오류 발생', cls: 'error'   },
  standby: { label: '준비 중',   cls: 'standby' },
  offline: { label: '오프라인',  cls: 'error'   }
};

function renderRobots(robots) {
  const grid = document.getElementById('robot-grid');
  if (!robots || Object.keys(robots).length === 0) {
    grid.innerHTML = `<div class="robot-card" style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px 0;">
      로봇 데이터가 없습니다
    </div>`;
    return;
  }

  grid.innerHTML = Object.entries(robots).map(([id, r]) => {
    const stateInfo = STATE_LABELS[r.state] || { label: r.state, cls: 'idle' };
    const errors    = (r.errors || []).filter(Boolean);
    const battery   = r.batteryLevel != null ? r.batteryLevel : '—';
    const battColor = battery < 20 ? 'color:var(--danger)' : battery < 50 ? 'color:var(--warning)' : 'color:var(--success)';
    const lastTs    = r.lastUpdate ? new Date(r.lastUpdate).toLocaleTimeString('ko-KR', { hour12: false }) : '—';

    return `
    <div class="robot-card">
      <div class="robot-header">
        <div>
          <div class="robot-name">${r.name || id}</div>
          <div class="robot-id">${id}</div>
        </div>
        <div class="status-pill ${stateInfo.cls}">
          <span class="dot"></span>
          ${stateInfo.label}
        </div>
      </div>
      <div class="robot-state-row">
        <span class="label">현재 작업</span>
        <span class="value">${r.currentTask || '—'}</span>
      </div>
      <div class="robot-state-row ${battery !== '—' && battery < 20 ? 'has-error' : 'ok'}">
        <span class="label">배터리</span>
        <span class="value" style="${battColor}">${battery !== '—' ? battery + '%' : '—'}</span>
      </div>
      <div class="robot-state-row">
        <span class="label">오늘 배식 수</span>
        <span class="value">${r.servedCount != null ? r.servedCount + '명' : '—'}</span>
      </div>
      <div class="robot-state-row ${errors.length > 0 ? 'has-error' : 'ok'}">
        <span class="label">오류 여부</span>
        <span class="value">${errors.length > 0 ? '❌ ' + errors.length + '건' : '✅ 정상'}</span>
      </div>
      <div class="robot-state-row">
        <span class="label">마지막 업데이트</span>
        <span class="value" style="font-size:12px;">${lastTs}</span>
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   FOOD REMAINING
══════════════════════════════════════ */
function renderFood(food) {
  const grid = document.getElementById('food-grid');
  if (!food) { grid.innerHTML = '<p style="color:var(--muted);font-size:13px;">데이터 없음</p>'; return; }

  grid.innerHTML = FOODS.map((name, i) => {
    const item  = food[name] || { total: 320, remaining: 0 };
    const pct   = item.total > 0 ? Math.round((item.remaining / item.total) * 100) : 0;
    const color = pct < 20 ? 'var(--danger)' : pct < 50 ? '#FB8C00' : '#4CAF50';
    const cls   = pct < 20 ? 'low' : pct < 50 ? 'mid' : 'full';

    return `
    <div class="food-row">
      <div class="food-emoji">${EMOJIS[i]}</div>
      <div class="food-info">
        <div class="food-name">${name}</div>
        <div class="food-bar-wrap">
          <div class="food-bar-fill" style="width:${pct}%;background:${color};"></div>
        </div>
      </div>
      <div class="food-remaining ${cls}">${item.remaining}<span style="font-size:11px;font-weight:400;color:var(--muted);">인분</span></div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   CAPACITY RING
══════════════════════════════════════ */
function renderCapacity(stats) {
  const total   = stats.totalStudents || 320;
  const served  = stats.servedToday   || 0;
  const remain  = Math.max(0, total - served);
  const pct     = total > 0 ? (remain / total) : 0;
  const circum  = 408.4;
  const offset  = circum * (1 - pct);
  const color   = pct < 0.2 ? 'var(--danger)' : pct < 0.5 ? '#FB8C00' : 'var(--primary)';

  document.getElementById('cap-ring').style.strokeDashoffset = offset;
  document.getElementById('cap-ring').setAttribute('stroke', color);
  document.getElementById('cap-val').textContent   = remain;
  document.getElementById('cap-fraction').textContent = `${served}명 완료 / 총 ${total}명`;
}

/* ══════════════════════════════════════
   KPI CARDS
══════════════════════════════════════ */
function renderKPI(stats, robots) {
  const total  = stats.totalStudents || 320;
  const served = stats.servedToday   || 0;
  const remain = Math.max(0, total - served);
  const queue  = stats.queueCount    || 0;

  let errorCount = 0;
  if (robots) {
    Object.values(robots).forEach(r => {
      errorCount += (r.errors || []).filter(Boolean).length;
      if (r.state === 'error') errorCount++;
    });
  }

  setText('kpi-served',      served + '<span class="kpi-unit">명</span>');
  setText('kpi-served-sub',  `오늘 ${new Date().toLocaleDateString('ko-KR', { month:'long', day:'numeric' })} 기준`);
  setText('kpi-remain',      remain + '<span class="kpi-unit">명</span>');
  setText('kpi-queue',       queue  + '<span class="kpi-unit">명</span>');
  setText('kpi-errors',      errorCount + '<span class="kpi-unit">건</span>');
  setText('kpi-errors-sub',  errorCount > 0 ? '⚠️ 즉시 확인 필요' : '✅ 정상');
}

/* ══════════════════════════════════════
   ERROR LOG
══════════════════════════════════════ */
function renderErrors(errors, robots) {
  const log = document.getElementById('error-log');
  let allErrors = [...(errors || [])];

  if (robots) {
    Object.entries(robots).forEach(([id, r]) => {
      if (r.state === 'error') {
        allErrors.push({ code: 'ROBOT_ERR', desc: `${r.name || id}: 로봇 오류 상태`, time: r.lastUpdate, robot: id });
      }
      (r.errors || []).forEach(e => {
        if (e) allErrors.push({ code: 'SYS_ERR', desc: (typeof e === 'string' ? e : JSON.stringify(e)), time: r.lastUpdate, robot: id });
      });
    });
  }

  if (allErrors.length === 0) {
    log.innerHTML = `<div class="no-error"><div class="no-error-icon">✅</div><div>활성 오류 없음 — 시스템 정상 작동 중</div></div>`;
    return;
  }

  log.innerHTML = allErrors.slice(0, 8).map(e => {
    const ts = e.time ? new Date(e.time).toLocaleTimeString('ko-KR', { hour12: false }) : '—';
    return `
    <div class="error-item">
      <div class="error-icon">⛔</div>
      <div>
        <div class="error-code">[${e.code || 'ERR'}] ${e.robot || ''}</div>
        <div class="error-desc">${e.desc || '알 수 없는 오류'}</div>
        <div class="error-time">${ts}</div>
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   RECENT ACTIVITY
══════════════════════════════════════ */
function renderActivity(recentServed) {
  const list = document.getElementById('activity-list');
  if (!recentServed || recentServed.length === 0) {
    list.innerHTML = `<div style="text-align:center;color:var(--muted);padding:24px 0;font-size:14px;">아직 배식 기록이 없습니다</div>`;
    return;
  }

  list.innerHTML = recentServed.slice(0, 10).map(s => {
    const ts = s.timestamp ? new Date(s.timestamp).toLocaleTimeString('ko-KR', { hour12: false }) : '—';
    const foods = s.counts ? Object.entries(s.counts).filter(([,v]) => v > 0).map(([k,v]) => `${k}×${v}`).join(' ') : '—';
    return `
    <div class="activity-item">
      <div class="activity-avatar">😊</div>
      <div>
        <div class="activity-name">${s.name || '학생'}</div>
        <div class="activity-sub">${s.grade ? s.grade + '학년 ' + s.class + '반' : ''} · ${foods}</div>
      </div>
      <div class="activity-time">${ts}</div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function setText(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

/* ══════════════════════════════════════
   FIREBASE REALTIME LISTENERS
══════════════════════════════════════ */
function initListeners() {
  // stats
  db.ref('stats').on('value', snap => {
    const stats = snap.val() || DEFAULT_DATA.stats;
    renderKPI(stats, null);
    renderCapacity(stats);
  });

  // robots
  db.ref('robots').on('value', snap => {
    const robots = snap.val() || DEFAULT_DATA.robots;
    renderRobots(robots);
    // re-fetch stats for error count
    db.ref('stats').once('value', s => {
      const stats = s.val() || DEFAULT_DATA.stats;
      renderKPI(stats, robots);
    });
    db.ref('errors').once('value', s => {
      renderErrors(s.val() || [], robots);
    });
  });

  // food
  db.ref('food').on('value', snap => {
    renderFood(snap.val() || DEFAULT_DATA.food);
  });

  // errors
  db.ref('errors').on('value', snap => {
    db.ref('robots').once('value', r => {
      renderErrors(snap.val() || [], r.val() || {});
    });
  });

  // recentServed — 최신 10개만
  db.ref('recentServed').limitToLast(10).on('value', snap => {
    const val = snap.val();
    const arr = val ? Object.values(val).reverse() : [];
    renderActivity(arr);
  });
}

/* ══════════════════════════════════════
   SEED DEFAULT DATA (없을 경우)
══════════════════════════════════════ */
async function seedDefaultsIfNeeded() {
  const statsSnap = await db.ref('stats').once('value');
  if (!statsSnap.exists()) {
    await db.ref('stats').set(DEFAULT_DATA.stats);
  }
  const robotsSnap = await db.ref('robots').once('value');
  if (!robotsSnap.exists()) {
    await db.ref('robots').set(DEFAULT_DATA.robots);
  }
  const foodSnap = await db.ref('food').once('value');
  if (!foodSnap.exists()) {
    await db.ref('food').set(DEFAULT_DATA.food);
  }
}

/* ══════════════════════════════════════
   REFRESH BUTTON
══════════════════════════════════════ */
function refreshAll() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spin');
  btn.disabled = true;

  Promise.all([
    db.ref('stats').once('value'),
    db.ref('robots').once('value'),
    db.ref('food').once('value'),
    db.ref('errors').once('value'),
    db.ref('recentServed').limitToLast(10).once('value')
  ]).then(([statsSnap, robotsSnap, foodSnap, errorsSnap, recentSnap]) => {
    const stats  = statsSnap.val()  || DEFAULT_DATA.stats;
    const robots = robotsSnap.val() || DEFAULT_DATA.robots;
    const food   = foodSnap.val()   || DEFAULT_DATA.food;
    const errors = errorsSnap.val() || [];
    const recentVal = recentSnap.val();
    const recent = recentVal ? Object.values(recentVal).reverse() : [];

    renderKPI(stats, robots);
    renderCapacity(stats);
    renderRobots(robots);
    renderFood(food);
    renderErrors(errors, robots);
    renderActivity(recent);
  }).finally(() => {
    setTimeout(() => {
      btn.classList.remove('spin');
      btn.disabled = false;
    }, 600);
  });
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
(async function init() {
  await seedDefaultsIfNeeded();
  initListeners();
})();
</script>
</body>
</html>
