<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OK 제스처 인식</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --ok-green: #00ff88;
    --warn-orange: #ff6b35;
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --text: #c8c8e0;
    --glow: 0 0 20px #00ff8855;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem 1rem 1rem;
  }

  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    color: #fff;
    text-shadow: 0 0 30px var(--ok-green), 0 0 60px rgba(0,255,136,0.3);
  }

  header p {
    margin-top: 0.5rem;
    font-size: 0.8rem;
    color: var(--ok-green);
    opacity: 0.7;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .main-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    padding: 1rem;
    width: 100%;
    max-width: 700px;
  }

  /* Camera + canvas wrapper */
  .cam-wrapper {
    position: relative;
    width: 100%;
    max-width: 640px;
    aspect-ratio: 4/3;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  /* Corner accents */
  .cam-wrapper::before, .cam-wrapper::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--ok-green);
    border-style: solid;
    z-index: 10;
    opacity: 0.6;
  }
  .cam-wrapper::before { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .cam-wrapper::after  { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  video {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas#output {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    transform: scaleX(-1);
  }

  /* Status overlay */
  .status-overlay {
    position: absolute;
    top: 12px; right: 12px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
  }

  .status-badge {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 5px 10px;
    border-radius: 4px;
    background: rgba(0,0,0,0.75);
    border: 1px solid var(--border);
    backdrop-filter: blur(4px);
    transition: all 0.2s;
  }

  .status-badge.detecting { color: var(--warn-orange); border-color: var(--warn-orange)44; }
  .status-badge.ok-detected {
    color: var(--ok-green);
    border-color: var(--ok-green)88;
    box-shadow: 0 0 12px rgba(0,255,136,0.35);
  }

  /* Big OK banner */
  #ok-banner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 15;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }

  #ok-banner.show { opacity: 1; }

  #ok-banner .ok-text {
    font-family: 'Orbitron', monospace;
    font-size: clamp(4rem, 18vw, 8rem);
    font-weight: 900;
    color: var(--ok-green);
    text-shadow:
      0 0 20px var(--ok-green),
      0 0 60px rgba(0,255,136,0.6),
      0 0 120px rgba(0,255,136,0.3);
    animation: pulse-ok 0.6s ease-in-out infinite alternate;
  }

  @keyframes pulse-ok {
    from { transform: scale(0.95); }
    to   { transform: scale(1.05); }
  }

  /* Info panel */
  .info-panel {
    width: 100%;
    max-width: 640px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .metric {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .metric-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(200,200,224,0.4);
  }

  .metric-value {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
  }

  .metric-value.ok { color: var(--ok-green); text-shadow: var(--glow); }
  .metric-value.no { color: var(--warn-orange); }

  /* Confidence bar */
  .conf-bar-bg {
    height: 4px;
    background: #1a1a2e;
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .conf-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--ok-green), #00ffcc);
    border-radius: 2px;
    transition: width 0.2s ease;
    box-shadow: 0 0 8px rgba(0,255,136,0.6);
  }

  /* How-to */
  .how-to {
    width: 100%;
    max-width: 640px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
  }

  .how-to h3 {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--ok-green);
    margin-bottom: 0.8rem;
    text-transform: uppercase;
  }

  .how-to ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .how-to li {
    font-size: 0.8rem;
    color: rgba(200,200,224,0.6);
    padding-left: 1.2em;
    position: relative;
  }

  .how-to li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--ok-green);
  }

  /* Loading */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    z-index: 100;
    transition: opacity 0.4s;
  }

  #loading.hidden { opacity: 0; pointer-events: none; }

  .loader-text {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    color: var(--ok-green);
    letter-spacing: 0.3em;
    animation: blink 1s infinite;
  }

  @keyframes blink { 50% { opacity: 0.2; } }

  .spinner {
    width: 48px; height: 48px;
    border: 2px solid var(--border);
    border-top-color: var(--ok-green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    box-shadow: 0 0 16px rgba(0,255,136,0.3);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    position: relative; z-index: 1;
    padding: 2rem 1rem;
    font-size: 0.7rem;
    color: rgba(200,200,224,0.25);
    letter-spacing: 0.1em;
    text-align: center;
  }
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loader-text">MEDIAPIPE 로딩 중...</div>
</div>

<header>
  <h1>👌 OK 제스처 인식</h1>
  <p>MediaPipe Hands · Real-time Detection</p>
</header>

<div class="main-container">

  <div class="cam-wrapper">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="output"></canvas>

    <div class="status-overlay">
      <div class="status-badge detecting" id="status-badge">SCANNING...</div>
    </div>

    <div id="ok-banner">
      <span class="ok-text">OK!</span>
    </div>
  </div>

  <div class="info-panel">
    <div class="metric">
      <div class="metric-label">제스처 상태</div>
      <div class="metric-value no" id="gesture-val">대기 중</div>
    </div>
    <div class="metric">
      <div class="metric-label">신뢰도</div>
      <div class="metric-value" id="conf-val">—</div>
      <div class="conf-bar-bg"><div class="conf-bar-fill" id="conf-bar"></div></div>
    </div>
    <div class="metric">
      <div class="metric-label">감지된 손</div>
      <div class="metric-value" id="hand-val">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">OK 횟수</div>
      <div class="metric-value ok" id="count-val">0</div>
    </div>
  </div>

  <div class="how-to">
    <h3>인식 방법</h3>
    <ul>
      <li>엄지와 검지 끝을 동그랗게 붙여 O 모양을 만드세요</li>
      <li>나머지 손가락 3개는 위로 쭉 펴주세요</li>
      <li>손 전체가 카메라에 잘 보이도록 해주세요</li>
      <li>밝은 배경 앞에서 더 잘 인식됩니다</li>
    </ul>
  </div>

</div>

<footer>POWERED BY MEDIAPIPE HANDS · GESTURE RECOGNITION</footer>

<!-- MediaPipe CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const video   = document.getElementById('video');
const canvas  = document.getElementById('output');
const ctx     = canvas.getContext('2d');

const loadingEl    = document.getElementById('loading');
const statusBadge  = document.getElementById('status-badge');
const okBanner     = document.getElementById('ok-banner');
const gestureVal   = document.getElementById('gesture-val');
const confVal      = document.getElementById('conf-val');
const confBar      = document.getElementById('conf-bar');
const handVal      = document.getElementById('hand-val');
const countVal     = document.getElementById('count-val');

let okCount = 0;
let lastOk  = false;

// ── OK 제스처 판별 ─────────────────────────────────────────
// 랜드마크 인덱스:
//  4=엄지끝, 8=검지끝, 12=중지끝, 16=약지끝, 20=새끼끝
//  6=검지PIP, 10=중지PIP, 14=약지PIP, 18=새끼PIP
//  5=검지MCP, 9=중지MCP, 13=약지MCP, 17=새끼MCP

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y, (a.z||0) - (b.z||0));
}

function isFingerExtended(lm, tipIdx, pipIdx, mcpIdx) {
  // tip이 pip보다 손목 방향으로 멀리 있으면 펴진 것
  return lm[tipIdx].y < lm[pipIdx].y && lm[pipIdx].y < lm[mcpIdx].y;
}

function detectOK(landmarks) {
  const lm = landmarks;

  // 1) 엄지-검지 거리 (정규화: 손바닥 크기 기준)
  const palmSize = dist(lm[0], lm[9]);          // 손목~중지MCP
  const thumbIdx = dist(lm[4], lm[8]);          // 엄지끝~검지끝
  const pinchRatio = thumbIdx / palmSize;        // 작을수록 꼭 붙어있음

  // 2) 나머지 손가락 3개 펴짐 여부
  const midExt    = isFingerExtended(lm, 12, 10, 9);
  const ringExt   = isFingerExtended(lm, 16, 14, 13);
  const pinkyExt  = isFingerExtended(lm, 20, 18, 17);

  // 3) 검지가 굽어져 있어야 함 (엄지와 붙어 O 형성)
  // 검지 tip이 PIP보다 아래에 있으면 굽힌 것
  const indexBent = lm[8].y > lm[6].y;

  // 판별
  const isPinch   = pinchRatio < 0.35;
  const threeUp   = midExt && ringExt && pinkyExt;
  const isOK      = isPinch && threeUp;

  // 신뢰도: 각 조건의 달성도를 합산
  let score = 0;
  score += Math.max(0, 1 - pinchRatio / 0.35);   // pinch: 0~1
  score += midExt   ? 1 : 0;
  score += ringExt  ? 1 : 0;
  score += pinkyExt ? 1 : 0;
  const confidence = score / 4;                   // 0~1

  return { isOK, confidence, pinchRatio, threeUp };
}

// ── 손 스켈레톤 그리기 (커스텀) ───────────────────────────
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

function drawHand(landmarks, isOK, w, h) {
  const color = isOK ? '#00ff88' : '#ff6b35';
  const glow  = isOK ? 'rgba(0,255,136,0.6)' : 'rgba(255,107,53,0.4)';

  // 연결선
  ctx.lineWidth = 2;
  ctx.strokeStyle = color;
  ctx.shadowColor = glow;
  ctx.shadowBlur  = 8;

  for (const [a, b] of CONNECTIONS) {
    const p1 = landmarks[a], p2 = landmarks[b];
    ctx.beginPath();
    ctx.moveTo(p1.x * w, p1.y * h);
    ctx.lineTo(p2.x * w, p2.y * h);
    ctx.stroke();
  }

  ctx.shadowBlur = 0;

  // 랜드마크 점
  for (let i = 0; i < landmarks.length; i++) {
    const p = landmarks[i];
    const isTip = [4,8,12,16,20].includes(i);
    ctx.beginPath();
    ctx.arc(p.x * w, p.y * h, isTip ? 7 : 4, 0, Math.PI * 2);
    ctx.fillStyle = isTip ? '#fff' : color;
    ctx.shadowColor = glow;
    ctx.shadowBlur  = isTip ? 12 : 6;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // OK일 때 엄지-검지 원 강조
  if (isOK) {
    const t = landmarks[4], idx = landmarks[8];
    const cx = ((t.x + idx.x) / 2) * w;
    const cy = ((t.y + idx.y) / 2) * h;
    const r  = Math.hypot((t.x - idx.x) * w, (t.y - idx.y) * h) / 2 + 12;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.shadowColor = 'rgba(0,255,136,0.8)';
    ctx.shadowBlur  = 16;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowBlur  = 0;
  }
}

// ── UI 업데이트 ───────────────────────────────────────────
function updateUI(results) {
  const { multiHandLandmarks, multiHandedness } = results;
  const w = canvas.width, h = canvas.height;

  ctx.clearRect(0, 0, w, h);

  const handCount = multiHandLandmarks ? multiHandLandmarks.length : 0;
  handVal.textContent = handCount;

  if (handCount === 0) {
    statusBadge.className = 'status-badge detecting';
    statusBadge.textContent = 'SCANNING...';
    gestureVal.className = 'metric-value no';
    gestureVal.textContent = '손 없음';
    confVal.textContent = '—';
    confBar.style.width = '0%';
    setOKState(false);
    return;
  }

  let anyOK = false;
  let maxConf = 0;

  for (let i = 0; i < handCount; i++) {
    const lm = multiHandLandmarks[i];
    const { isOK, confidence } = detectOK(lm);
    drawHand(lm, isOK, w, h);
    if (isOK) anyOK = true;
    if (confidence > maxConf) maxConf = confidence;
  }

  const pct = Math.round(maxConf * 100);
  confVal.textContent = pct + '%';
  confBar.style.width  = pct + '%';

  if (anyOK) {
    statusBadge.className = 'status-badge ok-detected';
    statusBadge.textContent = '✓ OK 감지!';
    gestureVal.className = 'metric-value ok';
    gestureVal.textContent = '👌 OK';
    if (!lastOk) {
      okCount++;
      countVal.textContent = okCount;
    }
  } else {
    statusBadge.className = 'status-badge detecting';
    statusBadge.textContent = 'SCANNING...';
    gestureVal.className = 'metric-value no';
    gestureVal.textContent = '인식 중...';
  }

  setOKState(anyOK);
}

function setOKState(on) {
  okBanner.classList.toggle('show', on);
  lastOk = on;
}

// ── MediaPipe 초기화 ──────────────────────────────────────
const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.6
});

hands.onResults(results => {
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  updateUI(results);
});

// ── Camera ────────────────────────────────────────────────
const camera = new Camera(video, {
  onFrame: async () => { await hands.send({ image: video }); },
  width: 640, height: 480
});

camera.start().then(() => {
  loadingEl.classList.add('hidden');
}).catch(err => {
  document.querySelector('.loader-text').textContent = '카메라 접근 실패: ' + err.message;
});
</script>
</body>
</html>
