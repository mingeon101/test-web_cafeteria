<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전체 학생 실시간 자동 계산기</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f7f6; }
        .container { max-width: 700px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { font-weight: bold; color: #28a745; margin-bottom: 20px; padding: 10px; background: #e8f5e9; border-radius: 5px; }
        .log-box { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 5px; max-height: 400px; overflow-y: auto; font-family: monospace; }
        .log-item { margin-bottom: 8px; border-bottom: 1px solid #3e3d32; padding-bottom: 5px; }
        .log-time { color: #75715e; font-size: 0.85em; }
        .log-success { color: #a6e22e; }
    </style>
</head>
<body>

<div class="container">
    <h2>전체 학생 데이터 실시간 모니터링 시스템</h2>
    <p>이 페이지는 <code>students</code> 노드 전체를 감시합니다. 어떤 학생의 <code>counts</code>가 변경되든 <strong>UID를 자동으로 파악</strong>하여 비율을 계산하고 <code>analysis</code>에 즉시 반영합니다.</p>
    
    <div class="status" id="status">Firebase 연결 중...</div>

    <h3>실시간 계산 로그</h3>
    <div class="log-box" id="log-container">
        <div class="log-item">시스템 시작 대기 중...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 본인의 Firebase 프로젝트 설정 값으로 변경하세요!
    const firebaseConfig = {
        apiKey: "AIzaSyC3SvV8-bTyQClyZlGWybhR3z5YvLGXYL0",
        authDomain: "smart-cafeteria-8a2ce.firebaseapp.com",
        databaseURL: "https://smart-cafeteria-8a2ce-default-rtdb.firebaseio.com",
        projectId: "smart-cafeteria-8a2ce",
        storageBucket: "smart-cafeteria-8a2ce.firebasestorage.app",
        messagingSenderId: "304671336012",
        appId: "1:304671336012:web:0fd90cf8e6cc06884176e9",
        measurementId: "G-JWNDVQC63K"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // 최상위 'students' 노드를 감시하여 하위의 모든 UID 동적 파악
    const studentsRef = ref(database, 'students');

    // 로그 출력 함수
    function addLog(message, isSuccess = true) {
        const logContainer = document.getElementById('log-container');
        const timeStr = new Date().toLocaleTimeString();
        const logItem = document.createElement('div');
        logItem.className = 'log-item';
        logItem.innerHTML = `<span class="log-time">[${timeStr}]</span> <span class="${isSuccess ? 'log-success' : ''}">${message}</span>`;
        logContainer.insertBefore(logItem, logContainer.firstChild);
    }

    document.getElementById('status').innerText = "상태: 전체 학생(students) 실시간 감시 활성화 됨";

    // students 노드 하위에 변화가 생기면 전체 스냅샷을 받아옴
    onValue(studentsRef, (snapshot) => {
        const studentsData = snapshot.val();
        
        if (!studentsData) {
            addLog("students 노드가 비어있거나 데이터가 없습니다.", false);
            return;
        }

        // Object.keys를 통해 데이터 내부에 존재하는 모든 학생 UID를 배열로 자동 추출
        const uids = Object.keys(studentsData);

        uids.forEach((uid) => {
            const student = studentsData[uid];
            
            // 구조 검사 (students/uid/serve/foods/counts 가 존재하는지)
            if (student && student.serve && student.foods && student.foods.counts) {
                const counts = student.foods.counts;
                
                const soupCount = parseInt(counts["국"]) || 0;
                const kimchiCount = parseInt(counts["김치"]) || 0;
                const riceCount = parseInt(counts["밥"]) || 0;

                const totalCount = soupCount + kimchiCount + riceCount;

                // 비율 계산
                const soupRate = totalCount > 0 ? parseFloat(((soupCount / totalCount) * 100).toFixed(1)) : 0;
                const kimchiRate = totalCount > 0 ? parseFloat(((kimchiCount / totalCount) * 100).toFixed(1)) : 0;
                const riceRate = totalCount > 0 ? parseFloat(((riceCount / totalCount) * 100).toFixed(1)) : 0;

                // 기존에 이미 계산된 값이 있는지 확인 (무한 루프 방지용 비교기)
                const currentAnalysis = student.foods.analysis || {};
                
                // 새로 계산된 값과 현재 DB에 있는 값이 다를 때만 저장 실행
                if (
                    currentAnalysis["국"]?.count !== soupCount || 
                    currentAnalysis["김치"]?.count !== kimchiCount || 
                    currentAnalysis["밥"]?.count !== riceCount
                ) {
                    const analysisResult = {
                        "국": { "count": soupCount, "rate": soupRate },
                        "김치": { "count": kimchiCount, "rate": kimchiRate },
                        "밥": { "count": riceCount, "rate": riceRate },
                        "totalCount": totalCount,
                        "lastUpdated": new Date().toISOString()
                    };

                    // 해당 학생의 analysis 경로에만 타겟팅 저장
                    const saveRef = ref(database, `students/${uid}/foods/analysis`);
                    set(saveRef, analysisResult)
                        .then(() => {
                            addLog(`학생 [${uid}] 데이터 자동 계산 완료 (총: ${totalCount}개)`);
                        })
                        .catch((error) => {
                            console.error(`[${uid}] 저장 실패:`, error);
                        });
                }
            }
        });
    });
</script>
</body>
</html>
